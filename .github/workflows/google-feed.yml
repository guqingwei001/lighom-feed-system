name: Generate Google Feed

on:
  # Cron offset 15 min from Meta + Pinterest to spread Shopline API load
  # Daily at 14:00 UTC (7 AM PT / 22:00 BJT) — 2h after Pinterest, no overlap.
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    # Normal run: 30-60min. 90min gives ~50% buffer + faster auto-recovery on stuck runs.
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate Google Feed
        env:
          SHOPLINE_API_TOKEN:    ${{ secrets.SHOPLINE_API_TOKEN }}
          SHOPLINE_DOMAIN:       ${{ secrets.SHOPLINE_DOMAIN }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          PYTHONUNBUFFERED:      "1"
        working-directory: meta-feed
        run: python generate_google.py
