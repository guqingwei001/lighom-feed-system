name: Generate Meta Feed

on:
  # Every 4 hours, on the hour. Adjust if needed; full Shopline pull
  # Daily at 10:00 UTC (3 AM PT / 18:00 BJT) — outside US ad peak hours.
  # Meta = 10:00, Pinterest = 12:00, Google = 14:00 (2h staggered, no overlap).
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    # Normal run: 30-60min. 90min gives ~50% buffer + faster auto-recovery on stuck runs
    # (e.g., Shopline API hang) — old 180min meant 3h dead time before next cron tick.
    timeout-minutes: 90
    env:
      # Opt into Node.js 24 for JS actions (Node 20 deprecation, Sep 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate Meta Feed
        env:
          SHOPLINE_API_TOKEN:    ${{ secrets.SHOPLINE_API_TOKEN }}
          SHOPLINE_DOMAIN:       ${{ secrets.SHOPLINE_DOMAIN }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          PYTHONUNBUFFERED:      "1"
        working-directory: meta-feed
        run: python generate.py

      - name: Upload feed as artifact (last-resort fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meta-feed-failed
          path: |
            /tmp/meta-feed.xml
            /tmp/smart-feed.xml
          if-no-files-found: ignore
          retention-days: 7
